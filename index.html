<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffb75e">
<title>Frutopia 🍉 — junta as frutas!</title>
<meta name="description" content="Larga frutas, junta duas iguais e tenta chegar à melancia. Jogo gratuito no browser — desafio diário incluído!">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍉</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1 id="gameTitle">🍉 Frutopia</h1>
    <div class="btns">
      <button id="modeBtn" class="chip" title="Modo"></button>
      <button id="soundBtn" class="chip" title="Som">🔊</button>
      <button id="restartBtn" class="chip" title="Reiniciar">↻</button>
    </div>
  </header>

  <div class="hud">
    <div class="stat">
      <span id="scoreLabel">Pontos</span>
      <b id="scoreVal">0</b>
    </div>
    <div class="stat">
      <span id="bestLabel">Recorde</span>
      <b id="bestVal">0</b>
    </div>
    <div class="stat next">
      <span id="nextLabel">Próxima</span>
      <canvas id="nextCanvas" width="56" height="56"></canvas>
    </div>
  </div>

  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay" class="hidden">
      <div class="panel">
        <h2 id="overTitle">Fim do jogo!</h2>
        <p id="overRecord" class="record hidden">🎉 Novo recorde!</p>
        <p class="overScore"><b id="overScore">0</b> <span id="overPts">pontos</span></p>
        <p id="overBiggest" class="biggest"></p>
        <div class="overBtns">
          <button id="againBtn" class="big-btn">Jogar de novo</button>
          <button id="shareBtn" class="big-btn alt">Partilhar 📋</button>
        </div>
      </div>
    </div>
  </div>

  <div id="evolution" title="Evolução das frutas"></div>
  <p id="hint">Toca para largar a fruta · junta duas iguais!</p>
</div>
<div id="toast" class="hidden"></div>
<script src="game.js"></script>
</body>
</html>
